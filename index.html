        :root {

            --euclid-color: #f1c40f;
            --keter-color: #e74c3c;
            --unknown-color: #95a5a6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-gray);

            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Lớp nền chữ chìm bảo mật */
        body::before {
            content: "CONFIDENTIAL";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 10vw;
            color: rgba(255, 255, 255, 0.03);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
        }

        header {
            background: #000;
            border-bottom: 3px solid var(--primary-red);
            padding: 15px 20px; /* Thu nhỏ chiều cao header */
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(255, 77, 77, 0.3);
        }

        header h1 { 
            color: var(--primary-red); 
            margin: 0; 
            letter-spacing: 4px; 
            font-size: 20px; /* Thu nhỏ cỡ chữ tiêu đề */
            text-transform: uppercase; 
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: var(--panel-bg);
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* Bọc toàn bộ hàng bao gồm cả phần chi tiết ẩn */
        .scp-item {
            border-bottom: 1px solid #222;
        }

        .scp-row {
            display: flex;
            padding: 12px 25px;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .scp-row:hover {
            background: rgba(255, 77, 77, 0.05);
            border-left: 8px solid var(--primary-red);
            color: #fff;
        }

        .scp-no {
            color: var(--primary-red);
            font-weight: bold;
            width: 130px;
            flex-shrink: 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
        }

        .scp-name {
            flex-grow: 1;
        }

        /* Biểu tượng mũi tên chỉ trạng thái đóng/mở */
        .scp-toggle-icon {
            font-size: 12px;
            color: #555;
            transition: transform 0.3s;
        }

        .scp-item.active .scp-toggle-icon {
            transform: rotate(180deg);
            color: var(--primary-red);
        }

        /* Phần thông tin chi tiết hiển thị khi click */
        .scp-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #111;
            padding: 0 25px;
        }

        .scp-item.active .scp-details {
            max-height: 200px; /* Đủ không gian cho nội dung trượt xuống */
            padding: 15px 25px;
            border-top: 1px dashed #222;
        }

        /* Định dạng nhãn phân loại */
        .class-badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 3px;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .class-safe { background: rgba(46, 204, 113, 0.2); color: var(--safe-color); border: 1px solid var(--safe-color); }
        .class-euclid { background: rgba(241, 196, 125, 0.2); color: var(--euclid-color); border: 1px solid var(--euclid-color); }
        .class-keter { background: rgba(231, 76, 60, 0.2); color: var(--keter-color); border: 1px solid var(--keter-color); }
        .class-unknown { background: rgba(149, 165, 166, 0.2); color: var(--unknown-color); border: 1px solid var(--unknown-color); }

        .scp-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #b0b0b0;
            white-space: pre-line; /* Giữ nguyên xuống dòng của 3 dòng mô tả */
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #000;
            border-top: 1px solid #333;
        }

        .status-badge {

            color: var(--primary-red);
            display: inline-block;
            margin-bottom: 15px;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>

    const classes = ["Euclid", "Safe", "Keter"];

    for (let i = 7; i <= 700; i++) {
        let key = i.toString().padStart(3, '0');
        let currentType = classes[i % 3];
        let title = rawNames[key] || "Đối tượng dị thường #" + key;
        
        if (!scpData[key]) {
            scpData[key] = {
                title: title,
                type: currentType,
                desc: `Một thực thể hoặc vật thể có đặc tính dị thường đang được Foundation quản thúc.\nĐược lưu giữ và nghiên cứu bởi SCP Foundation.`
            };
        }
    }

    // Kết xuất giao diện HTML động
    const listContainer = document.getElementById('scp-list');
    let output = '';

    for (let i = 0; i <= 700; i++) {
        let scpKey = i.toString().padStart(3, '0');
        let scp = scpData[scpKey];
        
        let badgeClass = "class-unknown";
        if (scp.type.toLowerCase().includes("safe")) badgeClass = "class-safe";
        else if (scp.type.toLowerCase().includes("euclid")) badgeClass = "class-euclid";
        else if (scp.type.toLowerCase().includes("keter")) badgeClass = "class-keter";

        output += `
            <div class="scp-item" onclick="toggleDetails(this)">
                <div class="scp-row">
                    <div class="scp-no">SCP-${scpKey}</div>
                    <div class="scp-name">${scp.title}</div>
                    <div class="scp-toggle-icon">▼</div>
                </div>
                <div class="scp-details">
                    <span class="class-badge ${badgeClass}">Phân loại: ${scp.type}</span>
                    <div class="scp-desc">${scp.desc}</div>
                </div>
            </div>
        `;
    }
    listContainer.innerHTML = output;

    // Hàm JavaScript xử lý hiệu ứng đóng/mở mượt mà khi bấm vào tên SCP
    function toggleDetails(element) {
        const isActive = element.classList.contains('active');
        
        // Đóng tất cả các mục khác đang mở (Tạo hiệu ứng Accordion gọn gàng)
        document.querySelectorAll('.scp-item').forEach(item => {
            item.classList.remove('active');
        });

        // Nếu mục vừa ấn chưa mở thì mở nó ra
        if (!isActive) {
            element.classList.add('active');
        }
    }
